<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-size: 10px; color: #666; margin: 0 6mm; }
  .row { display:flex; justify-content: space-between; }
</style>
</head><body onload="subst()">
  <div class="row">
    <div>Generated offline</div>
    <div>Page <span id="page"></span> / <span id="topage"></span></div>
  </div>
<script>
  // Official wkhtmltopdf approach: parse ?page=…&topage=… etc.
  function subst() {
    var vars = {};
    var parts = window.location.search.substring(1).split('&');
    for (var i = 0; i < parts.length; ++i) {
      var s = parts[i].split('=', 2);
      vars[decodeURIComponent(s[0])] = decodeURIComponent(s[1]);
    }
    function set(id, v){ var el = document.getElementById(id); if (el) el.textContent = v || ''; }
    set('page',   vars.page);
    set('topage', vars.topage);
  }
</script>
</body></html>
