# Human-friendly title; {{name}} is replaced by the profile's @name if present
title: "Lobster Profile Documentation"

sections:

  # We still insert a dynamic "Profile Purpose" from Processor.py, but
  # leaving this here allows you to keep a manual override if you ever want it.
  # If you don’t want a duplicate, Processor.py already removes a static
  # "Profile Purpose" section before inserting the dynamic one.
  Profile Purpose:
    Overview: ""

  Input Data:
    Endpoint URL: "/datawizardprofile/agent/url/text()"
    HTTP Method: "/datawizardprofile/agent/http_method/text()"
    MIME Type: "/datawizardprofile/agent/mime_type/text()"
    Content Type: "/datawizardprofile/agent/content_type/text()"
    Accept POST: "/datawizardprofile/agent/accept_post/text()"
    API Enabled: "/datawizardprofile/agent/enable_api/text()"

  # Enriched mapping with plain-language “How it’s calculated”
  Mapping:
    _auto: "with_formulas"

  Output Data:
    Success Profile: "/datawizardprofile/responsesettings/responseunits/unit_http/forward_profile/text()"
    Error Profile: "/datawizardprofile/responsesettings/responseunits/unit_http/error_profile/text()"
    Exception Profile: "/datawizardprofile/dataproperties/exception_profile/text()"
    Error Recipient: "/datawizardprofile/dataproperties/error_recipient/text()"

  Trigger:
    Profile Type: "/datawizardprofile/type/text()"
    Scheduler: "/datawizardprofile/scheduler/cron/text()"
    Enabled: "/datawizardprofile/enabled/text()"

  # Optional small summary table of profile metadata (example keys used by some exports)
  Profile Metadata:
    Profile Name: "/datawizardprofile/@name"
    Version: "/datawizardprofile/version/text()"
    Business Unit: "//businessunit/text()"
    Custom Class: "//custom_class/text()"
